<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rubik's Cube Guide</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<script src="https://kit.fontawesome.com/bd2a20b9b6.js"
crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
<script src="js.js"></script>
</head>


<body>

<nav class="navbar">

    <div class="logo">
        <i class="fa-solid fa-cube"></i>
        Cube App
    </div>

    <div class="nav-links">

        <div class="nav-item active"
        onclick="showSection('home', this)">
            <i class="fas fa-home"></i>
            Home
        </div>

        <div class="nav-item"
        onclick="showSection('learn', this)">
            <i class="fas fa-book"></i>
            Learn
        </div>

        <div class="nav-item"
        onclick="showSection('about', this)">
            <i class="fas fa-info-circle"></i>
            About
        </div>

    </div>

    <div class="dashboard-title">
        <div class="dashboard-dot"></div>
        <h2>Rubik's Cube Dashboard</h2>
    </div>

</nav>



<div class="content-area">

    <!-- HOME -->

    <div id="homeSection" class="section">

        <div class="card">

            <h1>Interactive Cube</h1>

            <model-viewer
                id="cube"
                src="rubiks_cube.glb"
                auto-rotate
                camera-controls>
            </model-viewer>

            <button onclick="toggleRotation()">
                Toggle Rotation
            </button>

            <button onclick="zoomIn()">
                Zoom In
            </button>

            <button onclick="zoomOut()">
                Zoom Out
            </button>

        </div>

    </div>

    <!-- LEARN -->

    <div id="learnSection" class="section">

        <div class="card">

            <h2>Learn to Solve</h2>

            <div class="menu-container">

                <div class="menu">

                    <button onclick="showStep(1)">Step 1</button>
                    <button onclick="showStep(2)">Step 2</button>
                    <button onclick="showStep(3)">Step 3</button>
                    <button onclick="showStep(4)">Step 4</button>
                    <button onclick="showStep(5)">Step 5</button>
                    <button onclick="showStep(6)">Step 6</button>

                </div>

                <div class="content-box" id="stepContent">
                    <h3>Select a step</h3>
                </div>

            </div>

        </div>

    </div>


    <div id="aboutSection" class="section">

        <div class="card">

            <h2>About</h2>

            <p>
                A 3D puzzle invented in 1974 by Erno Rubik.
                The goal is to solve all sides so each face
                has one solid color.
            </p>

        </div>

    </div>

</div>
</body>
</html>
